version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - BACKEND_CORS_ORIGINS=["http://localhost:3000"]
      - DATABASE_URL=sqlite+aiosqlite:////app/nayak.db
    volumes:
      - sqlite_data:/app
    restart: always

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v1
    depends_on:
      - api
    restart: always

volumes:
  sqlite_data:
